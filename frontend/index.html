<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Privacy hard-stop: this Content-Security-Policy forbids any network
      connection to anywhere except this origin. No HL7 data can be exfiltrated,
      no external scripts/fonts/analytics can load. connect-src 'none' would also
      block dev HMR websockets, so we scope to 'self' which still blocks all
      third-party origins.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws://127.0.0.1:* ws://localhost:*; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
    <title>HL7 Viewer &amp; Editor — 100% in your browser</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
